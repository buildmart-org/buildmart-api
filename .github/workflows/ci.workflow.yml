name: CI

on:
    pull_request:
        branches:
            - dev
            - main

    push:
        branches:
            - dev

jobs:
    build:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: test
                    POSTGRES_PASSWORD: test
                    POSTGRES_DB: test_db
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        env:
            DATABASE_URL: postgresql://test:test@localhost:5432/test_db

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install deps
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Apply migrations
              run: npx prisma migrate deploy

            - name: Lint
              run: npm run lint

            - name: Run tests
              run: npm run test --if-present

            - name: Build
              run: npm run build
